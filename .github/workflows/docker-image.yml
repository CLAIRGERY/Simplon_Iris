- name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # Une seule ligne pour le username !
          username: ${{ secrets.MONUSERNAMEDOCK }}
          password: ${{ secrets.MASECRETKEYDOCKER }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # N'oublie pas les ${{ }} ici aussi, sinon il cherche un site web
          tags: ${{ secrets.MONUSERNAMEDOCK }}/iris-backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.MONUSERNAMEDOCK }}/iris-frontend:latest
