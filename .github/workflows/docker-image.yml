name: CI/CD Docker Hub

on:
  push:
    branches: [ "main" ] # Se déclenche quand tu pousses sur la branche main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.clairgery }}
          password: ${{ secrets.MASECRETKEYDOCKER }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # REMPLACE TON_PSEUDO ICI
          tags: clairgery/iris-backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          # REMPLACE TON_PSEUDO ICI
          tags: clairgery/iris-frontend:latest
