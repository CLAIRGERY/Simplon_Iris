name: CI-CD-Iris

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.MONUSERNAMEDOCK }}
          password: ${{ secrets.MASECRETKEYDOCKER }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backendh: true
          tags: ${{ secrets.MONUSERNAMEDOCK }}/iris-backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.MONUSERNAMEDOCK }}/iris-frontend:latest
